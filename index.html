<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player">
        <h1 class="main-title">Music Player</h1> <!-- Header Title -->
        <div class="album-art" id="art"></div>
        <div class="info">
            <h2 id="title">Vibe Station</h2>
            <p id="artist">Artist Name</p>
        </div>
        
        <ul id="playlist">
            <li data-src="songs/song1.mp3">song one</li>
            <li data-src="songs/song2.mp3">Song Two</li>
            <li data-src="songs/song3.mp3">Song Three</li>
        </ul>

        <input type="range" id="progress" value="0">
        <div class="time-stamp">
            <span id="current-time">0:00</span>
            <span id="total-duration">0:00</span>
        </div>

        <div class="controls">
            <button id="prev">⏮</button>
            <button id="playBtn">▶</button>
            <button id="next">⏭</button>
        </div>
    </div>
    <audio id="audio" src="song.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
